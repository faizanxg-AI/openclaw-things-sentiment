[tool.pytest.ini_options]
minversion = "7.0"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--tb=short",
]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (multiple components)",
    "slow: Slow tests that may take significant time",
    "requires_things: Tests that require Things CLI to be installed",
]

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

[tool.scripts]
verify = "bash scripts/verify_poller.sh"
send-test = "bash scripts/send_test_message.sh"
